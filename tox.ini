[tox]
envlist = pre-commit,mypy,types,docs,twinecheck,min,min-framework,py310,py311,py312,py313,py314,framework

[testenv]
package = editable
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest
    pytest-asyncio
    pytest-cov
    requests
    aiohttp
    zyte-common-items

commands =
    pytest \
        --cov=web_poet \
        --cov-report=term-missing \
        --cov-report=xml \
        --doctest-modules \
        {posargs:web_poet tests}

[testenv:mypy]
deps =
    mypy==1.16.1
    aiohttp==3.12.13
    andi==0.8.0
    pytest==8.4.1
    types-requests==2.32.4.20250611
    types-python-dateutil==2.9.0.20250516
    url-matcher==0.6.0
    zyte-common-items==0.29.0

commands = mypy web_poet tests

[testenv:types]
deps =
    {[testenv]deps}
    {[testenv:mypy]deps}
    pytest-mypy-testing==0.1.3

commands = py.test {posargs: tests_typing}

[testenv:docs]
changedir = docs
basepython = python3
deps =
    -rdocs/requirements.txt
commands =
    sphinx-build -W -b html . {envtmpdir}/html

[testenv:pre-commit]
deps = -rrequirements-dev.txt
commands = pre-commit run --all-files --show-diff-on-failure

[testenv:min]
basepython = python3.10
deps =
    {[testenv]deps}
    pytest==7.0.0
    pytest-asyncio==0.17.2
    requests==2.27.0
    zyte-common-items==0.1.0
    aiohttp==3.7.0
    attrs==21.3.0
    parsel==1.5.0
    url-matcher==0.4.0
    tldextract==3.0.0
    multidict==5.0.0
    w3lib==1.22.0
    async-lru==1.0.3
    itemadapter==0.8.0
    andi==0.5.0
    python-dateutil==2.7.0
    time-machine==2.7.1
    packaging==20.0
    # pin older cssselect for old parsel
    cssselect==1.2.0

[testenv:twinecheck]
basepython = python3
deps =
    twine==6.1.0
    build==1.2.2.post1
commands =
    python -m build --sdist
    twine check dist/*

[testenv:framework]
deps =
    pytest
    pytest-asyncio
    pytest-cov
extras =
    simple_framework
commands =
    pytest \
        --cov=web_poet.simple_framework \
        --cov-report=term-missing \
        --cov-report=xml \
        {posargs:tests/test_framework.py}

[testenv:min-framework]
basepython = python3.10
deps =
    {[testenv:framework]deps}
    niquests==3.14.0
    playwright==1.20.0
commands =
    {[testenv:framework]commands}
